spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Hibernate schema 검증 비활성화 (운영 한정).
  # 이유: DB/AI 팀이 운영 RDS schema 를 직접 SQL 로 진화시킴 (recipe_media 드롭,
  # user_recipe_* 정규화 등 — 우리 Flyway baseline 이후 drift). 우리 서버는 5/26 라우팅
  # 대전환 후 auth/JWT 전용이라 recipe 도메인 entity 는 dead (front→AI). validate 는
  # 서빙하지 않는 dead 테이블 drift 에 false-positive 부팅 실패를 내므로 none 으로 둠.
  # auth/탈퇴 cleanup 경로(users/user_identities/user_profiles/likes/scraps/user_recipes/
  # chat_rooms)는 안정 테이블이라 무영향. local/test 는 base application.yml 의 validate 유지.
  # 정식 정리(dead 도메인 제거)는 별도 PR. (2026-06-07, B6 EC2 마이그레이션 중 발견)
  jpa:
    hibernate:
      ddl-auto: none

  # Flyway — 운영 RDS 는 DB 팀원이 DBv5 를 SQL 로 이미 적용한 상태.
  # 첫 부팅 시 baseline-on-migrate=true 가 flyway_schema_history 에
  # baseline row (version=1) 만 INSERT 하고 migrate 는 skip.
  # 향후 V2+ 마이그레이션이 추가되면 그 시점부터 정상 적용.
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
    baseline-description: "DBv5 baseline (DB 팀원이 운영 RDS 에 SQL 로 적용한 상태)"

jwt:
  secret: ${JWT_SECRET}

oauth:
  # 카카오 — 자체 로그인과 함께 운영. 키 누락 시 부팅 실패.
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}
    redirect-uri: ${KAKAO_REDIRECT_URI}

# CORS — 프론트 도메인은 반드시 env 로 주입 (default 의 localhost 가 prod 에 새지 않게).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# 쿠키: HTTPS 만, SameSite=Lax 기본 (필요 시 Strict 로 강화)
auth:
  cookie:
    secure: true
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    domain: ${AUTH_COOKIE_DOMAIN:}

# AWS — 버킷 미준비 시 빈 값 그대로 두면 업로드 endpoint 가 503 반환 (의도)
# 인프라 담당자 합의 후 env 로 주입.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET:}
    public-url-prefix: ${AWS_S3_PUBLIC_URL_PREFIX:}
