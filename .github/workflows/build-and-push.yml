name: build-and-push

# main 푸시 + 수동 실행에서: 통합테스트 → Docker 빌드 → ECR push.
# AWS 인증은 OIDC 로 (long-lived AccessKey 없음). 필요한 repo Secrets:
#   AWS_ROLE_TO_ASSUME, AWS_REGION, ECR_REPOSITORY  (deploy-env.md §5.2 참조)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token 발급용 (AWS configure-aws-credentials)

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle test (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (Testcontainers — Docker 사전 설치된 runner 사용)
        run: ./gradlew test --no-daemon --console=plain

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests

  build-and-push:
    name: Build image + push to ECR
    needs: test
    if: github.event_name != 'pull_request'   # PR 에선 빌드만 하지 않음 (테스트만 검증)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # EC2 t4g.small(ARM/Graviton) 운영 — arm64 이미지 빌드 위해 QEMU 에뮬레이션 활성화.
      # GitHub runner 는 amd64 라 cross-build 필요. base 이미지(eclipse-temurin)가 arm64 지원.
      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (sha + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        run: |
          echo "::notice title=Image pushed::${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
