name: build-and-push

# main 푸시 + 수동 실행에서: 통합테스트 → Docker 빌드 → ECR push.
# AWS 인증은 OIDC 로 (long-lived AccessKey 없음). 필요한 repo Secrets:
#   AWS_ROLE_TO_ASSUME, AWS_REGION, ECR_REPOSITORY  (deploy-env.md §5.2 참조)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token 발급용 (AWS configure-aws-credentials)

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle test (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests (Testcontainers — Docker 사전 설치된 runner 사용)
        run: ./gradlew test --no-daemon --console=plain

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests

  build-and-push:
    name: Build image + push to ECR
    needs: test
    if: github.event_name != 'pull_request'   # PR 에선 빌드만 하지 않음 (테스트만 검증)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # EC2 t4g.small(ARM/Graviton) 운영 — arm64 이미지 빌드 위해 QEMU 에뮬레이션 활성화.
      # GitHub runner 는 amd64 라 cross-build 필요. base 이미지(eclipse-temurin)가 arm64 지원.
      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (sha + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        run: |
          echo "::notice title=Image pushed::${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"

      # EC2(t4g.small) 배포 — SSM 으로 docker pull + app 재시작. SSH 키 불요.
      # 대상은 tag Name=naengo-api-server 인스턴스. user-data 와 동일한 run 옵션 사용.
      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region "${{ secrets.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=naengo-api-server" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "Deploy target: $INSTANCE_ID"
          REG="${{ steps.ecr-login.outputs.registry }}"
          IMG="$REG/${{ secrets.ECR_REPOSITORY }}:latest"
          CMD_ID=$(aws ssm send-command \
            --region "${{ secrets.AWS_REGION }}" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ github.sha }}" \
            --parameters commands="[\"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REG\",\"docker pull $IMG\",\"docker rm -f naengo-app 2>/dev/null || true\",\"docker run -d --name naengo-app --restart unless-stopped --network naengo --env-file /opt/naengo/app.env --log-driver awslogs --log-opt awslogs-region=${{ secrets.AWS_REGION }} --log-opt awslogs-group=/ec2/naengo-api-server --log-opt awslogs-create-group=true $IMG\",\"sleep 30\",\"docker run --rm --network naengo curlimages/curl:latest -sf -o /dev/null -w 'deploy healthcheck app:8080 -> %{http_code}\\n' http://naengo-app:8080/\"]" \
            --query 'Command.CommandId' --output text)
          echo "SSM CommandId: $CMD_ID"
          # 완료 대기
          for i in $(seq 1 30); do
            ST=$(aws ssm get-command-invocation --region "${{ secrets.AWS_REGION }}" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)
            echo "  [$i] $ST"
            case "$ST" in
              Success) echo "deploy OK"; break ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation --region "${{ secrets.AWS_REGION }}" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
                echo "deploy FAILED"; exit 1 ;;
            esac
            sleep 10
          done
          aws ssm get-command-invocation --region "${{ secrets.AWS_REGION }}" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text | tail -5
